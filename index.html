<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aureliyah.Space</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Magical book entrance -->
  <div id="book-entrance">
    <div id="fairy">🧚‍♀️</div>
    <div id="book">
      <h1>Welcome to Aureliyah.Space</h1>
      <p>Discover a magical world of learning!</p>

      <!-- Theme and age setup -->
      <div id="setup">
        <label>Pick a theme:</label>
        <select id="theme-select">
          <option value="default">Default</option>
          <option value="space">Space</option>
          <option value="forest">Forest</option>
        </select>

        <label>Pick your age/knowledge level:</label>
        <select id="age-select">
          <option value="seedling">Seedling (6-10)</option>
          <option value="sprout">Sprout (11-14)</option>
          <option value="sapling">Sapling (15-18)</option>
          <option value="cosmos">Cosmos (18+)</option>
        </select>

        <button id="enter-site">Enter Aureliyah.Space</button>
      </div>
    </div>
  </div>

  <!-- Homepage -->
  <div id="homepage" style="display:none;">
    <h1>Aureliyah.Space</h1>
    <p>Mission statement, stats, daily highlights, etc.</p>
    <button id="start-exploring">Start Exploring</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
